{% extends 'base/base_admin.html' %}
{% load static %}

{% block title %}
Painel Seletto
{% endblock %}

{% block content %}
<div class="pt-4 text-white" style="padding: 0 8em;">

    <!-- HEADER -->
    <div class="d-flex align-items-center gap-4 my-4">
        <img src="{% static 'img/logo.png' %}" alt="Seletto" class="img-fluid mb-3" style="width: 100px;">
        <div class="d-flex flex-column align-self-stretch justify-content-center">
            <h1>Painel de Atendimento</h1>
            <h5>Gerenciamento de Senhas</h5>
        </div>
    </div>

    <!-- CARDS (HTMX) -->
    <div id="stats-container"
         hx-get="{% url 'admin_stats_partial' %}"
         hx-trigger="load, every 3s"
         hx-swap="innerHTML">
    </div>

    <!-- CONTROLES -->
    <div class="py-4 px-4 d-flex flex-column gap-4 rounded-4 mb-4"
         style="background-color: rgb(23, 23, 23);">

        <h2 class="mb-0">Controles</h2>

        <!-- FORM CHAMAR PRÓXIMA -->
        <form id="chamarForm" method="POST" action="{% url 'chamar_proxima' %}">
            {% csrf_token %}

            <div class="d-flex flex-column gap-1 mb-3">
                <label for="atendente" class="fs-5">Nome do atendente</label>

                <input type="text"
                       name="atendente"
                       id="atendente"
                       placeholder="Digite o nome..."
                       class="rounded-4 px-3 fs-4 p-2 text-white"
                       style="background-color: rgb(38, 38, 38); border: none;"
                       required>
            </div>
        </form>

        <!-- BOTÕES -->
        <div class="row g-4 justify-content-center">

            <!-- CHAMAR PRÓXIMA -->
            <div class="col-12">
                <button type="submit"
                        form="chamarForm"
                        class="py-3 rounded-4 h-100 text-black border-0 w-100"
                        style="background-color: white;">
                    <div class="d-flex justify-content-center align-items-center gap-3">
                        <i class="bi bi-telephone-forward fs-5"></i>
                        <p class="fs-5 mb-0 teste">Chamar próxima</p>
                    </div>
                </button>
            </div>
    

        </div>
    </div>

    <!-- ATENDIMENTO ATUAL (HTMX) -->
    <div id="atendimento-container"
         hx-get="{% url 'admin_atendimento_partial' %}"
         hx-trigger="load, every 2s"
         hx-swap="innerHTML">
    </div>

    <!-- FILA (HTMX) -->
    <div id="fila-container"
         hx-get="{% url 'admin_fila_partial' %}"
         hx-trigger="load, every 3s"
         hx-swap="innerHTML">
    </div>

</div>

<!-- CONFIRMAÇÕES JS -->
<script>
document.addEventListener('DOMContentLoaded', function () {

    const pularForm = document.getElementById('pularForm');
    if (pularForm) {
        pularForm.addEventListener('submit', function (e) {
            if (!confirm('Tem certeza que deseja pular esta senha?')) {
                e.preventDefault();
            }
        });
    }

    const chamarForm = document.getElementById('chamarForm');
    if (chamarForm) {
        chamarForm.addEventListener('submit', function (e) {
            const input = document.getElementById('atendente');

            if (!input.value.trim()) {
                e.preventDefault();
                alert('Digite o nome do atendente.');
            }
        });
    }

});
</script>

{% endblock %}
