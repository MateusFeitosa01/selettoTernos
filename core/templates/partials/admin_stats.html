<div class="row g-4 justify-content-center mb-4">

    <div class="col-4">
        <div class="py-3 px-0 rounded-4 h-100" style="background-color: rgb(23, 23, 23);">
            <div class="d-flex justify-content-between align-items-center px-4">

                <div class="d-flex flex-column">
                    <p class="fs-4 text-secondary mb-0">Aguardando</p>
                    <p class="fs-1 mb-0">{{ aguardando|default:0 }}</p>
                </div>

                <i class="bi bi-clock fs-1"></i>

            </div>
        </div>
    </div>

    <div class="col-4">
        <div class="py-3 px-0 rounded-4 h-100" style="background-color: rgb(23, 23, 23);">
            <div class="d-flex justify-content-between align-items-center px-4">

                <div class="d-flex flex-column">
                    <p class="fs-4 text-secondary mb-0">Em andamento</p>
                    <p class="fs-1 mb-0">{{ em_atendimento|default:0 }}</p>
                </div>

                <i class="bi bi-person fs-1"></i>

            </div>
        </div>
    </div>

    <div class="col-4">
        <div class="py-3 px-0 rounded-4 h-100" style="background-color: rgb(23, 23, 23);">
            <div class="d-flex justify-content-between align-items-center px-4">

                <div class="d-flex flex-column">
                    <p class="fs-4 text-secondary mb-0">Atendidos</p>
                    <p class="fs-1 mb-0">{{ atendidos|default:0 }}</p>
                </div>

                <i class="bi bi-check2-circle fs-1"></i>

            </div>
        </div>
    </div>

</div>
