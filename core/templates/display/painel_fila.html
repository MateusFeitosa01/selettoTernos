{% extends 'base/base_display.html' %}
{% load static %}

{% block title %}
Display
{% endblock %}

{% block content %}
<div class="container-fluid bg-black min-vh-100 py-5 d-flex flex-column justify-content-center align-items-center text-white">

    <div class="text-center mb-2">
        <img src="{% static 'img/logo.png' %}" alt="Seletto" width="150" class="mx-auto mb-2"/>

        <p class="fs-2 mb-1">
            Atendimento
        </p>
    </div>

    <div
    id="display-content"
    hx-get="{% url 'display_partial' %}"
    hx-trigger="load, every 3s"
    hx-target="this"
    hx-swap="innerHTML">
</div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    let ultimaSenha = null;

    function verificarMudancaSenha() {

        const senhaElement = document.querySelector('#senha-atual-codigo');

        // Se não existir senha atual
        if (!senhaElement) {
            return;
        }

        const senhaAtual = senhaElement.innerText.trim();

        // Primeira execução
        if (ultimaSenha === null) {
            ultimaSenha = senhaAtual;
            return;
        }

        // Se mudou a senha
        if (senhaAtual !== ultimaSenha) {

            ultimaSenha = senhaAtual;

            // toca som e depois anuncia
            tocarSom(() => {
                anunciarSenha(senhaAtual);
            });
        }
    }

    // Detecta atualização do HTMX
    document.body.addEventListener('htmx:afterSwap', function () {
        verificarMudancaSenha();
    });

});

function tocarSom(callback) {

    const audio = new Audio('{% static "audio/notification.mp3" %}');

    audio.play()
        .then(() => {

            // Quando terminar o som
            audio.onended = () => {

                if (callback) {
                    callback();
                }
            };

        })
        .catch(() => {

            // fallback beep
            const context = new (
                window.AudioContext ||
                window.webkitAudioContext
            )();

            const oscillator = context.createOscillator();

            const gainNode = context.createGain();

            oscillator.connect(gainNode);

            gainNode.connect(context.destination);

            oscillator.frequency.setValueAtTime(
                800,
                context.currentTime
            );

            oscillator.frequency.setValueAtTime(
                600,
                context.currentTime + 0.1
            );

            gainNode.gain.setValueAtTime(
                0.3,
                context.currentTime
            );

            gainNode.gain.exponentialRampToValueAtTime(
                0.01,
                context.currentTime + 0.5
            );

            oscillator.start(context.currentTime);

            oscillator.stop(context.currentTime + 0.5);

            if (callback) {
                setTimeout(callback, 600);
            }
        });
}

function anunciarSenha(senha) {

    const synth = window.speechSynthesis;

    if (!synth) {
        return;
    }

    // Cancela falas anteriores
    synth.cancel();

    const mensagem = new SpeechSynthesisUtterance(
        `Senha ${formatarSenha(senha)}. Dirija-se ao atendimento.`
    );

    mensagem.lang = 'pt-BR';

    // velocidade
    mensagem.rate = 0.9;

    // tom
    mensagem.pitch = 1;

    // volume
    mensagem.volume = 1;

    synth.speak(mensagem);
}

function formatarSenha(senha) {

    // separa letras e números
    // PR001 -> P R 0 0 1
    return senha.split('').join(' ');
}
</script>
{% endblock %}
