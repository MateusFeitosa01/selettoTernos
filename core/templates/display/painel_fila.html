{% extends 'base/base_display.html' %}
{% load static %}

{% block title %}
Display
{% endblock %}

{% block content %}
<div class="container-fluid bg-black min-vh-100 py-5 d-flex flex-column justify-content-center align-items-center text-white">

    <div class="text-center mb-2">
        <img src="{% static 'img/logo.png' %}" alt="Seletto" width="150" class="mx-auto mb-2"/>

        <p class="fs-2 mb-1">
            Atendimento
        </p>
    </div>

    <div
        hx-get="{% url 'display_partial' %}"
        hx-trigger="load, every 3s"
        hx-target="this"
        hx-swap="innerHTML">

        {% include 'partials/display_content.html' %}

    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let previousContent = document.getElementById('display-content').innerHTML;
    
    // Verificar mudanças a cada 3s (mesmo intervalo do HTMX)
    setInterval(function() {
        const currentContent = document.getElementById('display-content').innerHTML;
        if (currentContent !== previousContent) {
            // Conteúdo mudou, tocar som
            playNotificationSound();
            previousContent = currentContent;
        }
    }, 3000);
});

function playNotificationSound() {
    // Criar elemento audio
    const audio = new Audio('{% static "js/notification.mp3" %}');
    audio.play().catch(e => {
        // Fallback para beep se arquivo não existir
        console.log('Som não disponível, usando beep');
        // Criar beep via Web Audio API
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = context.createOscillator();
        const gainNode = context.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(context.destination);
        
        oscillator.frequency.setValueAtTime(800, context.currentTime);
        oscillator.frequency.setValueAtTime(600, context.currentTime + 0.1);
        
        gainNode.gain.setValueAtTime(0.3, context.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.5);
        
        oscillator.start(context.currentTime);
        oscillator.stop(context.currentTime + 0.5);
    });
}
</script>
{% endblock %}
