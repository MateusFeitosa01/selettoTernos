{% extends 'base/base_display.html' %}
{% load static %}

{% block title %}
Display
{% endblock %}

{% block content %}
<div class="container-fluid bg-black min-vh-100 py-5 d-flex flex-column justify-content-center align-items-center text-white">

    <div class="text-center mb-2">
        <img src="{% static 'img/logo.png' %}" alt="Seletto" width="150" class="mx-auto mb-2"/>

        <p class="fs-2 mb-1">
            Atendimento
        </p>
    </div>

    <div
        hx-get="{% url 'display_partial' %}"
        hx-trigger="load, every 3s"
        hx-target="this"
        hx-swap="innerHTML">

        {% include 'partials/display_content.html' %}

    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {

        let ultimaSenha = null;

        function verificarMudancaSenha() {

            const senhaElement = document.querySelector('#senha-atual-codigo');

            if (!senhaElement) {
                return;
            }

            const senhaAtual = senhaElement.innerText.trim();

            // primeira execução
            if (ultimaSenha === null) {
                ultimaSenha = senhaAtual;
                return;
            }

            // mudou a senha
            if (senhaAtual !== ultimaSenha) {

                ultimaSenha = senhaAtual;

                tocarSom();

                // opcional: voz
                anunciarSenha(senhaAtual);
            }
        }

        // verifica após atualizações do HTMX
        document.body.addEventListener('htmx:afterSwap', function () {
            verificarMudancaSenha();
        });

    });

    function tocarSom() {

        const audio = new Audio('{% static "audio/notification.mp3" %}');   

        audio.play().catch(() => {

            // fallback beep
            const context = new (window.AudioContext || window.webkitAudioContext)();

            const oscillator = context.createOscillator();

            const gainNode = context.createGain();

            oscillator.connect(gainNode);

            gainNode.connect(context.destination);

            oscillator.frequency.value = 800;

            gainNode.gain.value = 0.2;

            oscillator.start();

            oscillator.stop(context.currentTime + 0.4);
        });
    }

    function anunciarSenha(senha) {

        if (!window.speechSynthesis) {
            return;
        }

        const mensagem = new SpeechSynthesisUtterance(
            `Senha ${senha}, dirigir-se ao atendimento`
        );

        mensagem.lang = 'pt-BR';

        window.speechSynthesis.speak(mensagem);
    }
</script>
{% endblock %}
